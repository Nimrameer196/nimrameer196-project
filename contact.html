<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get In Touch | Muhammad Saad</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome Icons Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Main Style CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    style="background-color: #ffffff; margin: 0; padding: 0; min-height: 100vh"
  >
    <!-- 1. UNIFIED PREMIUM NAVBAR -->
    <header class="navbar">
      <div class="custom-logo" onclick="window.location.href = 'index.html'">
        <span class="logo-ms">MS</span>
        <span class="logo-divider-line">|</span>
        <span class="logo-name">Muhammad Saad</span>
      </div>
      <nav class="nav-links">
        <a href="index.html">HOME</a>
        <a href="work.html">PROJECTS</a>
        <a href="about.html">ABOUT ME</a>
        <a href="contact.html" class="active">GET IN TOUCH</a>
      </nav>
    </header>

    <!-- 2. CONTACT MAIN SECTION -->
    <main class="contact-main-wrapper">
      <div class="contact-container">
        <!-- Left Side: Information -->
        <div class="contact-info-panel">
          <h1 class="contact-title">Let's Connect</h1>
          <p class="contact-subtitle">
            Have a project in mind or looking to collaborate? Drop a message!
          </p>

          <div class="info-meta-list">
            <div class="meta-item">
              <i class="fa-solid fa-phone"></i>
              <div>
                <span>Call / WhatsApp</span>
                <a href="https://wa.me/923362835568" target="_blank"
                  >+92 336 2835568</a
                >
              </div>
            </div>

            <div class="meta-item">
              <i class="fa-solid fa-envelope"></i>
              <div>
                <span>Email Address</span>
                <a href="mailto:muhammadsaad.e13@gmail.com"
                  >muhammadsaad.e13@gmail.com</a
                >
              </div>
            </div>

            <div class="meta-item">
              <i class="fa-brands fa-linkedin-in"></i>
              <div>
                <span>Professional Network</span>
                <a
                  href="https://www.linkedin.com/in/muhammadsaad-352a62182/"
                  target="_blank"
                  >Connect on LinkedIn</a
                >
              </div>
            </div>
          </div>
        </div>

        <!-- Right Side: Clean UI Preview that links to Google Form -->
        <div class="contact-form-panel">
          <div class="premium-contact-form">
            <div class="form-group">
              <label>Your name</label>
              <input
                type="text"
                placeholder="Your Name"
                disabled
                style="cursor: not-allowed"
              />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                placeholder="Your Email"
                disabled
                style="cursor: not-allowed"
              />
            </div>

            <div class="form-group">
              <label>Where you know us from? (WhatsApp/Platform)</label>
              <input
                type="text"
                placeholder="e.g. WhatsApp, LinkedIn, Upwork"
                disabled
                style="cursor: not-allowed"
              />
            </div>

            <div class="form-group">
              <label>Message</label>
              <textarea
                rows="5"
                placeholder="Your Message"
                disabled
                style="cursor: not-allowed"
              ></textarea>
            </div>

            <div class="form-form-footer">
              <div class="file-upload-wrapper">
                <span
                  class="file-drop-btn"
                  style="color: #999; cursor: not-allowed"
                >
                  <i class="fa-solid fa-paperclip"></i> Attach File (On Google
                  Form)
                </span>
              </div>

              <!-- Yeh Button direct unke Google Form par le jaye ga -->
              <!-- Abhi isme dummy link hai, jab Saad apna link dein to href="..." ke andar paste kar dena -->
              <a
                href="https://docs.google.com/forms/"
                target="_blank"
                class="orange-submit-btn"
                style="text-decoration: none; text-align: center"
              >
                Open Google Form
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
