<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Muhammad Saad</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #f5f5f0;
        color: #1a1a1a;
        font-family: "Georgia", serif;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 50px;
        background-color: #1a1a1a;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-icon {
        width: 35px;
        height: 35px;
        background-color: #ffffff;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 14px;
      }

      .logo-text {
        color: #ffffff;
        font-size: 14px;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .nav-links {
        display: flex;
        gap: 40px;
      }

      .nav-links a {
        color: #ffffff;
        text-decoration: none;
        font-size: 13px;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: color 0.3s;
      }

      .nav-links a:hover {
        color: #aaaaaa;
      }

      .page-header {
        padding: 80px 50px 40px;
        text-align: center;
      }

      .page-header h1 {
        font-size: 50px;
        letter-spacing: 8px;
        text-transform: uppercase;
        font-weight: 400;
        opacity: 0;
        animation: fadeUp 1s ease forwards 0.3s;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .contact-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 50px 100px;
        text-align: center;
      }

      .contact-container p {
        font-size: 15px;
        color: #666666;
        letter-spacing: 2px;
        line-height: 2;
        margin-bottom: 50px;
      }

      .contact-info {
        margin-bottom: 50px;
      }

      .contact-info a {
        display: block;
        font-size: 18px;
        color: #1a1a1a;
        text-decoration: none;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 20px;
        transition: color 0.3s;
      }

      .contact-info a:hover {
        color: #888888;
      }

      .social-links {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 40px;
      }

      .social-links a {
        color: #1a1a1a;
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        padding: 15px 30px;
        border: 1px solid #1a1a1a;
        transition: all 0.3s;
      }

      .social-links a:hover {
        background-color: #1a1a1a;
        color: #ffffff;
      }

      footer {
        padding: 50px;
        background-color: #1a1a1a;
        text-align: center;
      }

      footer p {
        color: #666666;
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="logo">
        <div class="logo-icon">MS</div>
        <span class="logo-text">Muhammad Saad</span>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="work.html">Work</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
        <button
          id="theme-toggle"
          style="
            background: none;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
            margin-left: 20px;
          "
        >
          LIGHT MODE
        </button>
      </div>
    </nav>

    <div class="page-header">
      <h1>Contact</h1>
    </div>

    <div class="contact-container">
      <p>Interested in working together?<br />Feel free to reach out.</p>

      <div class="contact-info">
        <a href="mailto:saad@email.com">saad@email.com</a>
      </div>

      <div class="social-links">
        <a href="#">LinkedIn</a>
        <a href="#">Instagram</a>
      </div>
    </div>

    <footer>
      <p>Muhammad Saad &bull; Mechanical Engineer</p>
    </footer>
  </body>
</html>
<script>
  const themeToggle = document.getElementById("theme-toggle");

  // 1. Page load hote hi check karo ke diary (localStorage) mein kya likha hai
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light-mode");
    themeToggle.innerText = "DARK MODE";
  }

  // 2. Button click hone par diary mein save karo
  themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");

    if (document.body.classList.contains("light-mode")) {
      themeToggle.innerText = "DARK MODE";
      localStorage.setItem("theme", "light"); // Diary mein likh diya
    } else {
      themeToggle.innerText = "LIGHT MODE";
      localStorage.setItem("theme", "dark"); // Diary mein badal diya
    }
  });
</script>
